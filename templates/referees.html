{% extends "base.html" %}
{% block title %}Referees{% endblock %}

{% block content %}
<h2 class="mb-4">Referee Statistics</h2>

<form method="GET" class="mb-4">
    <select name="view" class="form-select w-auto" onchange="this.form.submit()">
        <option value="average" {% if current_view == 'average' %}selected{% endif %}>Averages</option>
        <option value="total" {% if current_view == 'total' %}selected{% endif %}>Totals</option>
    </select>
</form>

<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>Referee</th>
            <th>{{ metric_label }}</th>
        </tr>
    </thead>
    <tbody>
        {% for ref in referees %}
        <tr>
            <td>{{ ref.ref_name }}</td>
            <td>{{ ref.metric }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
