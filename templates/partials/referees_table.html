<div id="referees-container" class="card shadow-sm">
    <div class="card-header bundesliga-red text-white">
        <h4 class="mb-0">Referee statistics...</h4>
    </div>
    <div class="card-body">
        <form class="mb-3">
            <select name="view" class="form-select w-auto" 
                    hx-get="/referees" 
                    hx-target="#referees-container" 
                    hx-swap="outerHTML"
                    hx-trigger="change">
                <option value="average" {% if current_view == 'average' %}selected{% endif %}>Cards per game</option>
                <option value="total" {% if current_view == 'total' %}selected{% endif %}>Total cards</option>
                <option value="red" {% if current_view == 'red' %}selected{% endif %}>Red cards</option>
            </select>
        </form>

        <table class="table table-striped table-hover mb-0">
            <thead>
                <tr>
                    <th>Referee</th>
                    <th class="text-center">{{ metric_label }}</th>
                </tr>
            </thead>
            <tbody>
                {% for ref in referees %}
                <tr>
                    <td>{{ ref.ref_name }}</td>
                    <td class="text-center">{{ ref.metric }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
