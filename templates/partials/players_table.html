<div id="scorers-container" class="row">
    <!-- Left Table - Before certain minute -->
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bundesliga-red text-white">
                <h4 class="mb-0">Goals scored before...</h4>
            </div>
            <div class="card-body">
                <form class="mb-3">
                    <div class="row g-3 align-items-center">
                        <div class="col-auto">
                            <label for="minutes" class="col-form-label">Before minute:</label>
                        </div>
                        <div class="col-auto">
                            <select name="minutes" id="minutes" class="form-select" 
                                    hx-get="/players" 
                                    hx-target="#scorers-container" 
                                    hx-include="[name='after_mins']"
                                    hx-trigger="change">
                                {% for mins in [5, 10, 15, 30, 45] %}
                                    <option value="{{ mins }}" {% if mins == current_mins %}selected{% endif %}>
                                        {{ mins }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </form>

                <table class="table table-striped table-hover mb-0">
                    <thead style="background-color: #E2001A !important; color: white !important;">
                        <tr>
                            <th>Player</th>
                            <th class="text-center">Goals</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for scorer in scorers_before %}
                        <tr>
                            <td>{{ scorer.scorer_name }}</td>
                            <td class="text-center">{{ scorer.goal_count }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Right Table - After certain minute -->
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bundesliga-red text-white">
                <h4 class="mb-0">Goals scored after...</h4>
            </div>
            <div class="card-body">
                <form class="mb-3">
                    <div class="row g-3 align-items-center">
                        <div class="col-auto">
                            <label for="after_mins" class="col-form-label">After minute:</label>
                        </div>
                        <div class="col-auto">
                            <select name="after_mins" id="after_mins" class="form-select"
                                    hx-get="/players" 
                                    hx-target="#scorers-container" 
                                    hx-include="[name='minutes']"
                                    hx-trigger="change">
                                {% for mins in [45, 60, 75, 80, 85, 90] %}
                                    <option value="{{ mins }}" {% if mins == current_after_mins %}selected{% endif %}>
                                        {{ mins }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </form>

                <table class="table table-striped table-hover mb-0">
                    <thead style="background-color: #E2001A !important; color: white !important;">
                        <tr>
                            <th>Player</th>
                            <th class="text-center">Goals</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for scorer in scorers_after %}
                        <tr>
                            <td>{{ scorer.scorer_name }}</td>
                            <td class="text-center">{{ scorer.goal_count }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
