{% extends "base.html" %}
{% block title %}Players{% endblock %}

{% block content %}
<h2 class="mb-4">Top goalscorers by time period</h2>

<form method="GET" class="mb-4">
    <div class="row g-3 align-items-center">
        <div class="col-auto">
            <label for="minutes" class="col-form-label">Goals scored before minute:</label>
        </div>
        <div class="col-auto">
            <select name="minutes" id="minutes" class="form-select" onchange="this.form.submit()">
                {% for mins in [15, 30, 45, 60, 75, 90] %}
                    <option value="{{ mins }}" {% if mins == current_mins %}selected{% endif %}>
                        {{ mins }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </div>
</form>

<table class="table table-striped table-hover bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Player</th>
            <th>Goals</th>
        </tr>
    </thead>
    <tbody>
        {% for scorer in scorers %}
        <tr>
            <td>{{ scorer.scorer_name }}</td>
            <td>{{ scorer.goal_count }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
