{% extends "base.html" %}

{% block title %}Teams{% endblock %}

{% block content %}


<body class="bg-light">
    <div class="container">
        <h2 class="my-4">Teams</h2>
<div class="team-grid">
  {% for team in teams %}
    {% set clean_name = team|trim %}
    <a href="/team/{{ clean_name }}" class="team-card">
      <!--<img src="/static/badges/{{ clean_name }}.png" class="badge" alt="{{ clean_name }}">-->
        <img src="{{ url_for('static', filename='badges/' ~ clean_name ~ '.png') }}"
             class="team-badge"
             alt="{{ clean_name }}">

      <p>{{ clean_name }}</p>
    </a>
  {% endfor %}
</div>
</div>

{% endblock %}
