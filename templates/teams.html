<!DOCTYPE html>
<html>
<head>
    <title>Bundesliga Teams</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
      .team-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 20px;
        padding: 20px;
      }
      .team-card {
        text-align: center;
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 8px;
        text-decoration: none;
        color: black;
      }
      /*.badge {*/
     .team-badge {
        width: 80px;
        height: 80px;
        object-fit: contain;
        /*background: red;*/
      }
    </style>
</head>
<body class="bg-light">
    <h1 style="color:red;">TEST</h1>
    <div class="container">
        <h2 class="my-4">Bundesliga Teams</h2>
<div class="team-grid">
  {% for team in teams %}
    {% set clean_name = team|trim %}
    <a href="/team/{{ clean_name }}" class="team-card">
      <!--<img src="/static/badges/{{ clean_name }}.png" class="badge" alt="{{ clean_name }}">-->
        <img src="{{ url_for('static', filename='badges/' ~ clean_name ~ '.png') }}"
             class="team-badge"
             alt="{{ clean_name }}">

      <p>{{ clean_name }}</p>
    </a>
  {% endfor %}
</div>
    </div>
</body>
</html>
