<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Bundesliga App{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!--<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=1.1">

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <link rel="preload" as="image" href="{{ url_for('static', filename='bundesliga_logo_b.png') }}">

    <!--<meta charset="latin-1">-->
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bundesliga-red mb-4">
    <div class="container">
        <!-- Left part -->
        <div class="d-flex align-items-center">
            <img src="{{ url_for('static', filename='bundesliga_logo_b.png') }}"
                 width="30"
                 height="30"
                 loading="eager"
                 class="me-2">
            <a class="nav-link text-white p-0" href="/">Home</a>
        </div>

        <!-- Central part -->
        <div class="position-absolute start-50 translate-middle-x">
            <span class="text-white fw-bold" style="font-size: 1.5rem;">Bundesliga 2023-24 stats</span>
        </div>

        <!-- Right part -->
        <div class="navbar-nav">
            <a class="nav-link text-white" href="/teams">Teams</a>
            <a class="nav-link text-white" href="/players">Players</a>
            <a class="nav-link text-white" href="/referees">Referees</a>
            <a class="nav-link text-white" href="/matches">Matches</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
