{% extends "base.html" %}

{% block title %}Matches{% endblock %}

{% block content %}


<h2 class="mb-4">Match outliers</h2>

<!-- Dropdown Form -->
<form method="GET" class="mb-4">
    <div class="row g-3 align-items-center">
        <div class="col-auto">
            <label for="stat" class="col-form-label">Select statistic:</label>
        </div>
        <div class="col-auto">
            <select name="stat" id="stat" class="form-select" onchange="this.form.submit()">
                {% for key, label in stats.items() %}
                    <option value="{{ key }}"
                        {% if key == selected_stat %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </div>
</form>

<!-- Table -->
<table class="table table-striped table-hover bg-white shadow-sm" style="width: auto; max-width: 630px;">
    <thead>
        <tr>
            <!--<th class="bundesliga-red">Match</th>-->
            <!--<th class="bundesliga-red">{{ stats[selected_stat] }}</th>-->
            <th class="text-center" style="background-color: #E2001A; color : white !important;">Match</th>
            <th class="text-center" style="background-color: #E2001A; color : white !important;">{{ stats[selected_stat] }}</th>
        </tr>
    </thead>
    <tbody>
        {% for match in results %}
        <tr>
            <td>{{ match[0] }}</td>
            <td class="text-center" >{{ match[1] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<br>

{% endblock %}
