{% extends "base.html" %}

{% block title %}Match Outliers{% endblock %}

{% block content %}


<h2 class="mb-4">Match Outliers</h2>

<!-- Dropdown Form -->
<form method="GET" class="mb-4">
    <div class="row g-3 align-items-center">
        <div class="col-auto">
            <label for="stat" class="col-form-label">Select Statistic:</label>
        </div>
        <div class="col-auto">
            <select name="stat" id="stat" class="form-select" onchange="this.form.submit()">
                {% for key, label in stats.items() %}
                    <option value="{{ key }}"
                        {% if key == selected_stat %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <!--<div class="col-auto">-->
        <!--    <button type="submit" class="btn btn-primary">Update</button>-->
        <!--</div>-->
    </div>
</form>

<!-- Table -->
<table class="table table-striped table-hover bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Match</th>
            <th>{{ stats[selected_stat] }}</th>
        </tr>
    </thead>
    <tbody>
        {% for match in results %}
        <tr>
            <td>{{ match[0] }}</td>
            <td>{{ match[1] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
